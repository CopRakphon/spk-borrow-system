<style>
/* ═══════════════════════════════════════════
   CSS.html v4.0 — SPK Borrow System 2026
═══════════════════════════════════════════ */
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=Prompt:wght@400;600;700&display=swap');

:root{
  --p:#1565C0;--pl:#42A5F5;--pp:#E3F2FD;
  --a:#0288D1;--a2:#00BCD4;
  --ok:#43A047;--warn:#FB8C00;--err:#E53935;
  --rose:#FFEBEE;
  --glass:rgba(255,255,255,0.74);
  --gborder:rgba(255,255,255,0.56);
  --sh:0 8px 32px rgba(21,101,192,0.13);
  --shl:0 20px 60px rgba(21,101,192,0.22);
  --r:24px;--rs:14px;
  --f:'Sarabun',sans-serif;--fh:'Prompt',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--f);
  background:linear-gradient(135deg,#E3F2FD 0%,#BBDEFB 35%,#E1F5FE 65%,#EDE7F6 100%);
  min-height:100vh;color:#1a2a4a;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 50% at 15% 15%,rgba(66,165,245,.18) 0%,transparent 70%),
    radial-gradient(ellipse 50% 60% at 85% 85%,rgba(0,188,212,.14) 0%,transparent 70%);
  z-index:0;
}

/* ── Glass Card ── */
.card{
  background:var(--glass);
  backdrop-filter:blur(18px) saturate(180%);
  -webkit-backdrop-filter:blur(18px) saturate(180%);
  border:1.5px solid var(--gborder);
  border-radius:var(--r);
  box-shadow:var(--sh);
  position:relative;z-index:1;
}

/* ── Header ── */
.app-header{
  background:rgba(255,255,255,.9);
  backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);
  border-bottom:1.5px solid var(--gborder);
  padding:0 20px;height:64px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  box-shadow:0 4px 20px rgba(21,101,192,.08);gap:10px;
}
.header-brand{display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-logo{width:42px;height:42px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(21,101,192,.25))}
.header-title{font-family:var(--fh);font-size:.96rem;font-weight:700;color:var(--p);line-height:1.2}
.header-sub{font-size:.67rem;color:var(--a);font-weight:500}

/* ── Nav ── */
.nav-tabs{display:flex;gap:3px;background:rgba(227,242,253,.7);border-radius:50px;padding:4px;flex-wrap:wrap}
.nav-tab{padding:6px 13px;border-radius:50px;border:none;cursor:pointer;
  font-family:var(--f);font-size:.79rem;font-weight:600;color:#5577aa;
  background:transparent;transition:all .22s;white-space:nowrap}
.nav-tab.active{background:var(--p);color:#fff;box-shadow:0 4px 14px rgba(21,101,192,.35)}
.nav-tab:hover:not(.active){background:rgba(255,255,255,.8);color:var(--p)}

/* ── Layout ── */
.app-main{padding:20px;max-width:1380px;margin:0 auto;position:relative;z-index:1}
.page{display:none;animation:fsl .28s ease}
.page.active{display:block}
@keyframes fsl{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── Stat Cards ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(168px,1fr));gap:14px;margin-bottom:18px}
.stat-card{padding:18px 20px;border-radius:var(--r);display:flex;align-items:center;gap:13px;
  position:relative;overflow:hidden;transition:transform .25s,box-shadow .25s}
.stat-card:hover{transform:translateY(-4px) scale(1.02);box-shadow:var(--shl)}
.stat-card::after{content:'';position:absolute;top:-30%;right:-20%;
  width:100px;height:100px;border-radius:50%;background:rgba(255,255,255,.18)}
.sicon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;
  justify-content:center;font-size:1.3rem;flex-shrink:0;background:rgba(255,255,255,.28)}
.sval{font-family:var(--fh);font-size:1.8rem;font-weight:700;line-height:1}
.slbl{font-size:.74rem;opacity:.88;margin-top:3px}
.s-blue  {background:linear-gradient(135deg,#1565C0,#42A5F5);color:#fff}
.s-cyan  {background:linear-gradient(135deg,#0277BD,#00BCD4);color:#fff}
.s-green {background:linear-gradient(135deg,#2E7D32,#66BB6A);color:#fff}
.s-orange{background:linear-gradient(135deg,#E65100,#FFA726);color:#fff}
.s-purple{background:linear-gradient(135deg,#6A1B9A,#AB47BC);color:#fff}

/* ── Bento ── */
.bento{display:grid;grid-template-columns:1fr 1fr;gap:16px}
@media(max-width:900px){.bento{grid-template-columns:1fr}}

/* ── Section title ── */
.sec-title{font-family:var(--fh);font-weight:700;font-size:.94rem;color:var(--p);
  margin-bottom:12px;display:flex;align-items:center;gap:7px}

/* ── Chart & Overdue ── */
.chart-wrap{padding:18px}
.overdue-wrap{padding:18px;max-height:360px;overflow-y:auto}
.ov-row{padding:10px 13px;border-radius:12px;margin-bottom:7px;
  background:var(--rose);border-left:4px solid var(--err);font-size:.81rem}
.ov-name{font-weight:700;color:#b71c1c}
.ov-det{color:#c62828;font-size:.76rem;margin-top:2px}

/* ── Real-time badge ── */
.rt{display:inline-flex;align-items:center;gap:5px;
  background:rgba(67,160,71,.12);color:var(--ok);
  padding:3px 9px;border-radius:50px;font-size:.7rem;font-weight:600}
.rt-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Forms ── */
.fsec{padding:20px}
.ftitle{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--p);
  margin-bottom:15px;display:flex;align-items:center;gap:8px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px}
@media(max-width:640px){.fgrid{grid-template-columns:1fr}}
.fg{display:flex;flex-direction:column;gap:5px}
.fg.full{grid-column:1/-1}
label{font-size:.8rem;font-weight:600;color:#3a5080}
input,select,textarea{
  padding:9px 12px;border-radius:var(--rs);
  border:1.5px solid #BBDEFB;background:rgba(255,255,255,.85);
  font-family:var(--f);font-size:.86rem;color:#1a2a4a;
  transition:border-color .2s,box-shadow .2s;outline:none;width:100%}
input:focus,select:focus,textarea:focus{
  border-color:var(--pl);box-shadow:0 0 0 3px rgba(66,165,245,.15)}

/* ── Toggle ── */
.tgl{display:flex;background:rgba(227,242,253,.7);border-radius:50px;
  padding:4px;width:fit-content;margin-bottom:15px}
.tgl-btn{padding:7px 18px;border-radius:50px;border:none;cursor:pointer;
  font-family:var(--f);font-weight:600;font-size:.83rem;
  transition:all .22s;color:#5577aa;background:transparent}
.tgl-btn.active{background:var(--p);color:#fff;box-shadow:0 4px 14px rgba(21,101,192,.3)}

/* ── Item Row (borrow) ── */
.irow{display:grid;grid-template-columns:2fr 1fr auto;gap:9px;align-items:end;
  margin-bottom:9px;padding:12px;
  background:rgba(227,242,253,.5);border-radius:13px;
  border:1.5px solid rgba(187,222,251,.6)}

/* ── Buttons ── */
.btn{padding:9px 20px;border-radius:50px;border:none;cursor:pointer;
  font-family:var(--f);font-weight:700;font-size:.86rem;
  position:relative;overflow:hidden;
  transition:transform .2s,box-shadow .2s;
  display:inline-flex;align-items:center;gap:7px}
.btn::after{content:'';position:absolute;top:50%;left:-60%;width:40%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.35),transparent);
  transform:translateY(-50%) skewX(-20deg);transition:left .48s}
.btn:hover::after{left:130%}
.btn:hover{transform:translateY(-2px) scale(1.02)}
.btn:active{transform:scale(.97)}
.btn-p {background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;box-shadow:0 6px 18px rgba(21,101,192,.28)}
.btn-ok{background:linear-gradient(135deg,#2E7D32,#66BB6A);color:#fff;box-shadow:0 6px 18px rgba(46,125,50,.25)}
.btn-er{background:linear-gradient(135deg,#C62828,#EF5350);color:#fff;box-shadow:0 6px 18px rgba(198,40,40,.25)}
.btn-ol{background:#fff;color:var(--p);border:2px solid var(--pl);box-shadow:none}
.btn-sm{padding:6px 13px;font-size:.76rem}
.btn-ic{width:32px;height:32px;padding:0;border-radius:50%;justify-content:center;font-size:.92rem}

/* ── Signature ── */
.sig-wrap{border:2px dashed #90CAF9;border-radius:16px;overflow:hidden;background:#fff}
#signatureCanvas{display:block;cursor:crosshair;touch-action:none}

/* ── Table ── */
.twrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.82rem}
thead th{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;
  padding:10px 12px;text-align:left;font-family:var(--fh);font-weight:600;white-space:nowrap}
thead th:first-child{border-radius:12px 0 0 0}
thead th:last-child{border-radius:0 12px 0 0}
tbody tr{border-bottom:1px solid rgba(187,222,251,.4);transition:background .15s}
tbody tr:hover{background:rgba(227,242,253,.5)}
tbody td{padding:9px 12px;vertical-align:middle}
.badge{display:inline-block;padding:2px 9px;border-radius:50px;font-size:.72rem;font-weight:700}
.b-act {background:#E3F2FD;color:#1565C0}
.b-part{background:#FFF3E0;color:#E65100}
.b-done{background:#E8F5E9;color:#2E7D32}

/* ── Search bar ── */
.sbar{display:flex;gap:9px;align-items:center;margin-bottom:12px;flex-wrap:wrap}
.sinput{flex:1;min-width:170px;padding:8px 14px;border-radius:50px;
  border:1.5px solid #BBDEFB;background:rgba(255,255,255,.85);
  font-family:var(--f);font-size:.84rem;outline:none;transition:box-shadow .2s}
.sinput:focus{box-shadow:0 0 0 3px rgba(66,165,245,.15);border-color:var(--pl)}

/* ── Upload ── */
.up-area{border:2px dashed #90CAF9;border-radius:16px;padding:18px;text-align:center;
  cursor:pointer;transition:background .2s;background:rgba(255,255,255,.6)}
.up-area:hover{background:rgba(227,242,253,.7)}
.up-prev{max-width:100%;max-height:140px;border-radius:10px;margin-top:9px}

/* ══════════════════════════════
   CATALOG
══════════════════════════════ */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:16px;margin-top:14px}
.cat-card{border-radius:20px;overflow:hidden;
  transition:transform .28s cubic-bezier(.4,0,.2,1),box-shadow .28s;cursor:pointer;position:relative}
.cat-card:hover{transform:translateY(-6px) scale(1.024);box-shadow:var(--shl)}
.cat-img-wrap{width:100%;height:175px;
  background:linear-gradient(135deg,#E3F2FD,#BBDEFB);
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.cat-img{width:100%;height:100%;object-fit:cover;transition:transform .4s}
.cat-card:hover .cat-img{transform:scale(1.07)}
.cat-ph{font-size:3.2rem;opacity:.35;display:flex;flex-direction:column;align-items:center}
.cat-ph small{font-size:.7rem;opacity:.7;font-family:var(--f);margin-top:4px}
.cat-chip{position:absolute;top:9px;left:9px;background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);padding:3px 10px;border-radius:50px;
  font-size:.69rem;font-weight:700;color:var(--p)}
.cat-upbtn{position:absolute;top:9px;right:9px;background:rgba(255,255,255,.88);
  backdrop-filter:blur(8px);border:none;border-radius:50%;width:30px;height:30px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.85rem;
  transition:all .2s;opacity:0}
.cat-card:hover .cat-upbtn{opacity:1}
.cat-upbtn:hover{background:var(--p);color:#fff}
.cat-bar{position:absolute;bottom:0;left:0;right:0;height:5px;background:rgba(0,0,0,.1)}
.cat-fill{height:100%;border-radius:0 3px 3px 0;transition:width .5s}
.cat-body{padding:13px 15px 15px}
.cat-name{font-family:var(--fh);font-weight:700;font-size:.92rem;color:#1a2a4a;
  margin-bottom:3px;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cat-asset{font-size:.71rem;color:#7a9abb;margin-bottom:9px}
.cat-srow{display:flex;justify-content:space-between;align-items:center}
.cat-slbl{font-size:.73rem;color:#5577aa}
.cat-snum{font-family:var(--fh);font-size:1.1rem;font-weight:700}
.c-ok{color:var(--ok)}.c-lo{color:var(--warn)}.c-no{color:var(--err)}
.cat-acts{display:flex;gap:5px;margin-top:11px}
.cat-btn{flex:1;padding:7px 0;border-radius:50px;border:none;cursor:pointer;
  font-family:var(--f);font-weight:700;font-size:.76rem;transition:all .2s;text-align:center}
.cb-borrow{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;
  box-shadow:0 4px 12px rgba(21,101,192,.25)}
.cb-borrow:hover{transform:translateY(-2px)}
.cb-edit{background:#fff;color:var(--p);border:1.5px solid var(--pl)}
.cb-edit:hover{background:var(--pp)}

/* ── Return qty ── */
.ret-qty{width:62px!important;padding:5px 7px!important;text-align:center}

/* ── Loader ── */
.loader{position:fixed;inset:0;background:rgba(227,242,253,.78);
  backdrop-filter:blur(6px);display:none;
  align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:11px}
.lspinner{width:44px;height:44px;border-radius:50%;
  border:4px solid rgba(21,101,192,.15);border-top-color:var(--p);
  animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:var(--fh);color:var(--p);font-size:.86rem}

/* ══════════════════════════════
   PRINT
══════════════════════════════ */
@media print{
  .app-header,.app-main,footer,.loader,
  .modal-ov,#printArea{display:none!important}
  #printArea.show{display:block!important;padding:14mm 18mm}
}
#printArea{display:none;font-family:'Sarabun',sans-serif;color:#000}
.pr-header{text-align:center;margin-bottom:12px}
.pr-logo{width:62px;height:62px;object-fit:contain}
.pr-school{font-size:14pt;font-weight:700;margin:3px 0}
.pr-title{font-size:13pt;font-weight:700;margin:3px 0}
.pr-year{font-size:11pt;margin:3px 0}
.pr-table{width:100%;border-collapse:collapse;margin-top:10px;font-size:10pt}
.pr-table th,.pr-table td{border:1px solid #333;padding:5px 7px;vertical-align:middle}
.pr-table th{background:#BBDEFB;font-weight:700;text-align:center}
.pr-table td{text-align:center}
.pr-table td.l{text-align:left}
.pr-sigs{margin-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:50px}
.pr-sig{text-align:center}
.pr-sig-img{max-width:170px;max-height:65px}
.pr-sig-line{border-top:1px solid #333;margin-top:6px;padding-top:5px;font-size:10pt}

/* ── Modal ── */
.modal-ov{position:fixed;inset:0;background:rgba(0,0,0,.35);
  z-index:200;display:none;align-items:center;justify-content:center}
.modal-box{width:min(540px,95vw);padding:24px;max-height:90vh;overflow-y:auto}

/* ── Footer ── */
.app-footer{
  background:linear-gradient(135deg,var(--p),#0D47A1);
  color:rgba(255,255,255,.92);text-align:center;
  padding:14px 20px;font-size:.75rem;font-family:var(--f);
  position:relative;z-index:1;margin-top:32px}

/* ── Responsive ── */
@media(max-width:640px){
  .app-header{padding:0 10px;height:auto;padding-top:7px;padding-bottom:7px;flex-wrap:wrap}
  .nav-tabs{gap:2px}
  .nav-tab{padding:5px 9px;font-size:.72rem}
  .app-main{padding:10px}
  .cat-grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:11px}
  .cat-img-wrap{height:140px}
  .bento{grid-template-columns:1fr}
}
</style>
